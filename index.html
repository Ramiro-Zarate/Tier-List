<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="script.js" defer></script>
    <link rel="icon" href="./assets/logo.png">
    <title>Tier Maker</title>
</head>
<body>
    <header>
        // no se que poner de h1
        <img id="logo" src="./assets/image.png" alt="imagen Tier">
    </header>
    <main>
        <section id="place">
            <div class="tier">
                <div class="tS"><p contenteditable="true">S</p></div>
            </div>
            <div class="tier">
                <div class="tA"><p contenteditable="true">A</p></div>
            </div>
            <div class="tier">
                <div class="tB"><p contenteditable="true">B</p></div>
            </div>
            <div class="tier">
                <div class="tC"><p contenteditable="true">C</p></div>
            </div>
            <div class="tier">
                <div class="tF"><p contenteditable="true">F</p></div>
            </div>
        </section>
        <section id="sectionButtons">
            <button id="addImage">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-square-plus"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 12h6" /><path d="M12 9v6" /><path d="M3 5a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v14a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-14z" /></svg>
            </button>
            <input multiple accept="image/*" id="inputImage" type="file" hidden>
            <button id="resetButton">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-restore"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3.06 13a9 9 0 1 0 .49 -4.087" /><path d="M3 4.001v5h5" /><path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /></svg>
            </button>
            <button>
            </button>
        </section>
        <section id="sectionItems">

        </section>
    </main>
    <footer></footer>
</body>
</html>
